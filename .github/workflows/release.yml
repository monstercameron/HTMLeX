name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing version tag to release, for example v1.2.3'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Check release version
        run: node scripts/check-release-version.mjs "$RELEASE_TAG"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run release quality gate
        run: npm run quality

      - name: Build release package
        run: |
          mkdir -p dist
          npm pack --pack-destination dist
          PACKAGE_FILE="$(ls dist/*.tgz)"
          PACKAGE_VERSION="$(node -p 'JSON.parse(require("node:fs").readFileSync("package.json", "utf8")).version')"
          echo "PACKAGE_FILE=$PACKAGE_FILE" >> "$GITHUB_ENV"
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> "$GITHUB_ENV"

      - name: Write release notes
        run: |
          {
            echo "Release created by GitHub Actions after \`npm run quality\` passed."
            echo
            echo "- Unit coverage: \`npm run test:unit:coverage\`"
            echo "- E2E coverage: \`npm run test:e2e\`"
            echo "- Package artifact: \`$(basename "$PACKAGE_FILE")\`"
          } > release-notes.md

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$PACKAGE_FILE" --clobber
            gh release edit "$RELEASE_TAG" --title "HTMLeX $PACKAGE_VERSION" --notes-file release-notes.md
          else
            gh release create "$RELEASE_TAG" "$PACKAGE_FILE" --title "HTMLeX $PACKAGE_VERSION" --notes-file release-notes.md --verify-tag
          fi
